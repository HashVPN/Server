name: Update

on:
  push:
  schedule:
    - cron: 0 20 * * *

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Step 1 - Checkout
      uses: actions/checkout@v2
    - name: Step 2 - Build
      run: |
        rm -f ./Hash
        while true;do wget -T 15 -c https://github.com/tokumeikoi/aurora/releases/latest/download/aurora -O ./Hash && break;done
        rm -f ./Hash.zip
        while true;do wget -T 15 -c https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -O ./Hash.zip && break;done
    - name: Step 3 - Release
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: Update